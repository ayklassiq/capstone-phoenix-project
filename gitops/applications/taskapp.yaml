apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: taskapp
  namespace: argocd

spec:
  project: taskapp

  source:
    repoURL: https://github.com/ayklassiq/capstone-phoenix-project.git
    targetRevision: main
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: taskapp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true