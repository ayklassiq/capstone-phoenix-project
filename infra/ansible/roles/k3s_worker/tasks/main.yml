---
- name: Install K3s agent
  ansible.builtin.shell: |
    curl -sfL {{ k3s_install_url }} | \
    K3S_URL=https://{{ hostvars[groups['k3s_server'][0]].private_ip }}:6443 \
    K3S_TOKEN={{ k3s_token }} \
    sh -
  args:
    creates: /usr/local/bin/k3s-agent
  when: not k3s_agent.stat.exists
  
- name: Check if K3s agent is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s-agent
  register: k3s_agent

- name: Read node token from control plane
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  delegate_to: "{{ groups['k3s_server'][0] }}"
  run_once: true
  register: cluster_token

- name: Set K3s token
  ansible.builtin.set_fact:
    k3s_token: "{{ cluster_token.content | b64decode | trim }}"

- name: Enable and start K3s agent
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true
