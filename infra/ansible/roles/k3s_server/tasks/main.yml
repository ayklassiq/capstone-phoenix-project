---
- name: Check if K3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary


- name: Create K3s configuration directory
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    mode: "0755"

- name: Deploy K3s configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    mode: "0644"
  register: k3s_config


- name: Install K3s server
  ansible.builtin.shell: |
    curl -sfL {{ k3s_install_url }} | \
    INSTALL_K3S_VERSION={{ k3s_version }} \
    sh -s - server {{ k3s_server_args | join(' ') }}
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Restart K3s
  ansible.builtin.service:
    name: k3s
    state: restarted
  when: k3s_config.changed
  
- name: Wait for Kubernetes API
  ansible.builtin.wait_for:
    port: 6443
    host: 127.0.0.1
    timeout: 300

- name: Read node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token

- name: Store node token
  ansible.builtin.set_fact:
    k3s_node_token: "{{ node_token.content | b64decode | trim }}"