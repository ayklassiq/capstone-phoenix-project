apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskapp-frontend
  namespace: taskapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskapp-frontend
  template:
    metadata:
      labels:
        app: taskapp-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ts-a-devops/taskapp-frontend:c2b906d
          imagePullPolicy: Always
          ports:
            - containerPort: 80